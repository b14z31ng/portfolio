services:
  # ──────────────────────────────────────
  # FastAPI Backend
  # ──────────────────────────────────────
  - type: web
    name: portfolio-api
    runtime: docker
    dockerfilePath: infrastructure/docker/Dockerfile.api
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: portfolio-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_USERNAME
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ──────────────────────────────────────
  # Next.js Frontend
  # ──────────────────────────────────────
  - type: web
    name: portfolio-web
    runtime: docker
    dockerfilePath: infrastructure/docker/Dockerfile.web
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: portfolio-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_SITE_URL
        fromService:
          type: web
          name: portfolio-web
          envVarKey: RENDER_EXTERNAL_URL

  # ──────────────────────────────────────
  # Redis Key-Value Store
  # ──────────────────────────────────────
  - type: keyvalue
    name: portfolio-redis
    plan: starter
    region: oregon

databases:
  # ──────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────
  - name: portfolio-db
    plan: starter
    region: oregon
    databaseName: portfolio
    user: portfolio
